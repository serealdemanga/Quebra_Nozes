name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-starter-tests:
    name: Backend starter (check + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        working-directory: 04_STARTER_BACKEND/esquilo_cloudflare_d1_starter
        run: npm install

      - name: Typecheck
        working-directory: 04_STARTER_BACKEND/esquilo_cloudflare_d1_starter
        run: npm run check

      - name: Tests
        working-directory: 04_STARTER_BACKEND/esquilo_cloudflare_d1_starter
        run: npm test

