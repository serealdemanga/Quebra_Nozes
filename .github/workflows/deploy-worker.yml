name: Deploy Worker (Controlled)

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Ambiente de deploy (controlado)"
        required: true
        type: choice
        options:
          - hml
          - production
      ref:
        description: "Branch/tag/sha para deploy (opcional). Vazio = ref atual do workflow."
        required: false
        default: ""

concurrency:
  group: deploy-worker-${{ inputs.target_env }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (${{ inputs.target_env }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Validate Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing secret: CLOUDFLARE_API_TOKEN (or CF_API_TOKEN)." >&2
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing secret: CLOUDFLARE_ACCOUNT_ID (or CF_ACCOUNT_ID)." >&2
            exit 1
          fi
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install (worker)
        working-directory: 04_STARTER_BACKEND/esquilo_cloudflare_d1_starter
        run: npm ci

      - name: Install (web)
        working-directory: apps/web/app
        run: npm ci

      - name: Deploy (build gate + wrangler)
        working-directory: 04_STARTER_BACKEND/esquilo_cloudflare_d1_starter
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: "false"
        run: |
          if [ "${{ inputs.target_env }}" = "production" ]; then
            npm run deploy:prod
          else
            npm run deploy:hml
          fi

      - name: Rollback (best-effort, production only)
        if: failure() && inputs.target_env == 'production'
        continue-on-error: true
        working-directory: 04_STARTER_BACKEND/esquilo_cloudflare_d1_starter
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: "false"
        run: npm run rollback:prod

