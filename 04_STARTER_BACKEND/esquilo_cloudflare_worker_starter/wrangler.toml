name = "esquilo-invest-api"
main = "src/index.ts"
compatibility_date = "2026-03-30"
workers_dev = true

[vars]
APP_ENV = "development"
API_VERSION = "v1"

[[d1_databases]]
binding = "DB"
database_name = "esquilo-invest"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "IMPORTS_BUCKET"
bucket_name = "esquilo-imports"

[observability.logs]
enabled = true
