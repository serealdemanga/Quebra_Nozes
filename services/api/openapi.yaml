openapi: 3.1.0
info:
  title: Quebra_Nozes API
  version: 0.1.0
  description: API inicial do projeto novo do Esquilo Invest.
paths:
  /v1/history/snapshots:
    get:
      summary: Ler histórico de snapshots da carteira primária
      responses:
        '200':
          description: OK
components:
  schemas:
    HistoryData:
      type: object
      properties:
        screenState:
          type: string
          enum: [redirect_onboarding, empty, ready]
        redirectTo:
          type: string
        portfolioId:
          type: string
