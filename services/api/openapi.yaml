openapi: 3.1.0
info:
  title: Quebra_Nozes API
  version: 0.1.0
  description: API inicial do projeto novo do Esquilo Invest.
paths:
  /v1/imports/start:
    post:
      summary: Iniciar importação manual em lote
      responses:
        '200':
          description: OK
  /v1/imports/{importId}/preview:
    get:
      summary: Ler preview da importação manual
      parameters:
        - in: path
          name: importId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /v1/imports/{importId}/commit:
    post:
      summary: Commitar importação manual consistente
      parameters:
        - in: path
          name: importId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
components:
  schemas:
    ImportStartData:
      type: object
      properties:
        importId: { type: string }
        status: { type: string }
        nextStep: { type: string }
    ImportPreviewData:
      type: object
      properties:
        importId: { type: string }
        status: { type: string }
        origin: { type: string }
        readyToCommit: { type: boolean }
    ImportCommitData:
      type: object
      properties:
        importId: { type: string }
        status: { type: string }
        createdSnapshotId: { type: string }
        affectedPositions: { type: number }
        nextStep: { type: string }
