openapi: 3.1.0
info:
  title: Quebra_Nozes API
  version: 0.1.0
  description: API inicial do projeto novo do Esquilo Invest.
paths:
  /v1/imports/start:
    post:
      summary: Iniciar importação manual, CSV ou documento assistido
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiOkImportStart'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
  /v1/imports/{importId}/preview:
    get:
      summary: Ler preview da importação
      parameters:
        - in: path
          name: importId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiOkImportPreview'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
        '404':
          description: Nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
  /v1/imports/{importId}/engine-status:
    get:
      summary: Ler status operacional do motor de extração
      parameters:
        - in: path
          name: importId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiOkImportEngineStatus'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
        '404':
          description: Nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
  /v1/imports/{importId}/detail:
    get:
      summary: Ler detalhe operacional do processamento da importação
      parameters:
        - in: path
          name: importId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiOkImportDetail'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
        '404':
          description: Nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
  /v1/imports/{importId}/commit:
    post:
      summary: Commitar importação consistente
      parameters:
        - in: path
          name: importId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiOkImportCommit'
        '400':
          description: Requisicao invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
        '401':
          description: Nao autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
        '404':
          description: Nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeError'
  /v1/imports/templates/custom:
    get:
      summary: Baixar template próprio CSV
      responses:
        '200':
          description: OK
  /v1/imports/templates/b3:
    get:
      summary: Baixar modelo CSV de referência B3
      responses:
        '200':
          description: OK
components:
  schemas:
    ResponseMeta:
      type: object
      required: [requestId, timestamp, version]
      properties:
        requestId: { type: string }
        timestamp: { type: string }
        version: { type: string }
        sourceWarning: { type: string, nullable: true }
    ApiError:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true, nullable: true }
    ApiEnvelopeOk:
      type: object
      required: [ok, meta, data]
      properties:
        ok: { type: boolean, const: true }
        meta: { $ref: '#/components/schemas/ResponseMeta' }
        data: { type: object }
    ApiEnvelopeError:
      type: object
      required: [ok, meta, error]
      properties:
        ok: { type: boolean, const: false }
        meta: { $ref: '#/components/schemas/ResponseMeta' }
        error: { $ref: '#/components/schemas/ApiError' }
    ApiOkImportStart:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelopeOk'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ImportStartData'
    ApiOkImportPreview:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelopeOk'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ImportPreviewData'
    ApiOkImportEngineStatus:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelopeOk'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ImportEngineStatusData'
    ApiOkImportDetail:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelopeOk'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ImportDetailData'
    ApiOkImportCommit:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelopeOk'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ImportCommitData'
    ImportStartData:
      type: object
      properties:
        importId: { type: string }
        status: { type: string }
        nextStep: { type: string }
        importable: { type: boolean }
    ImportPreviewData:
      type: object
      properties:
        importId: { type: string }
        status: { type: string }
        origin: { type: string }
        readyToCommit: { type: boolean }
        importable: { type: boolean }
    ImportEngineStatusData:
      type: object
      properties:
        importId: { type: string }
        origin: { type: string }
        importStatus: { type: string }
        document:
          type: object
          properties:
            parserMode: { type: string, nullable: true }
            confidence: { type: number, nullable: true }
            importable: { type: boolean }
        engineStatus:
          type: object
          properties:
            code: { type: string }
            label: { type: string }
            body: { type: string }
            readyForReview: { type: boolean }
            readyToCommit: { type: boolean }
    ImportDetailData:
      type: object
      properties:
        importId: { type: string }
        issueSummary:
          type: object
          properties:
            errorRows: { type: number }
            conflictRows: { type: number }
            lowConfidenceRows: { type: number }
            nonImportableRows: { type: number }
        decisionSummary:
          type: object
          properties:
            manualRows: { type: number }
            fallbackRows: { type: number }
            aiRows: { type: number }
            systemRows: { type: number }
    ImportCommitData:
      type: object
      properties:
        importId: { type: string }
        status: { type: string }
        createdSnapshotId: { type: string }
        affectedPositions: { type: number }
        nextStep: { type: string }
