openapi: 3.1.0
info:
  title: Quebra_Nozes API
  version: 0.1.0
  description: API inicial do projeto novo do Esquilo Invest.
servers:
  - url: https://api.example.com
    description: producao
  - url: https://hml-api.example.com
    description: homologacao
paths:
  /v1/health:
    get:
      summary: Health check da aplicacao
      responses:
        '200':
          description: OK
  /v1/auth/register:
    post:
      summary: Registrar usuario e abrir sessao inicial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: Usuario registrado
  /v1/auth/login:
    post:
      summary: Login com CPF ou e-mail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Sessao criada
  /v1/auth/session:
    get:
      summary: Ler sessao atual
      responses:
        '200':
          description: Estado da sessao
  /v1/auth/logout:
    post:
      summary: Encerrar sessao atual
      responses:
        '200':
          description: Sessao encerrada
  /v1/auth/recover:
    post:
      summary: Solicitar recuperacao por e-mail no fluxo inicial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRecoverRequest'
      responses:
        '200':
          description: Recuperacao solicitada
  /v1/profile/context:
    get:
      summary: Ler contexto financeiro e status do onboarding
      responses:
        '200':
          description: OK
    put:
      summary: Atualizar contexto financeiro por etapa do onboarding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileContextUpsertRequest'
      responses:
        '200':
          description: OK
  /v1/dashboard/home:
    get:
      summary: Ler home da carteira
      responses:
        '200':
          description: OK
  /v1/portfolio:
    get:
      summary: Ler carteira consolidada
      responses:
        '200':
          description: OK
  /v1/portfolio/{portfolioId}/holdings/{holdingId}:
    get:
      summary: Ler detalhe de holding
      parameters:
        - in: path
          name: portfolioId
          required: true
          schema:
            type: string
        - in: path
          name: holdingId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /v1/history/snapshots:
    get:
      summary: Ler snapshots da carteira
      responses:
        '200':
          description: OK
  /v1/analysis:
    get:
      summary: Ler analise consolidada
      responses:
        '200':
          description: OK
  /v1/imports/start:
    post:
      summary: Iniciar importacao
      responses:
        '200':
          description: OK
  /v1/imports/{importId}/preview:
    get:
      summary: Ler preview da importacao
      parameters:
        - in: path
          name: importId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /v1/imports/{importId}/commit:
    post:
      summary: Confirmar importacao
      parameters:
        - in: path
          name: importId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
components:
  schemas:
    AuthRegisterRequest:
      type: object
      required:
        - cpf
        - email
        - password
        - confirmPassword
      properties:
        cpf:
          type: string
        email:
          type: string
        password:
          type: string
        confirmPassword:
          type: string
        displayName:
          type: string
        rememberDevice:
          type: boolean
    AuthLoginRequest:
      type: object
      required:
        - identifier
        - password
      properties:
        identifier:
          type: string
        password:
          type: string
        rememberDevice:
          type: boolean
    AuthRecoverRequest:
      type: object
      required:
        - identifier
      properties:
        identifier:
          type: string
    ProfileContextUpsertRequest:
      type: object
      required:
        - step
        - context
      properties:
        step:
          type: string
          enum: [goal, risk_quiz, income_horizon, platforms]
        context:
          type: object
          properties:
            financialGoal:
              type: string
            financialGoalOther:
              type: string
            monthlyIncomeRange:
              type: string
            monthlyInvestmentTarget:
              type: number
            availableToInvest:
              type: number
            riskProfileSelfDeclared:
              type: string
              enum: [conservador, moderado, arrojado]
            riskProfileQuizResult:
              type: string
              enum: [conservador, moderado, arrojado]
            investmentHorizon:
              type: string
            platformsUsed:
              type: object
              properties:
                platformIds:
                  type: array
                  items:
                    type: string
                otherPlatforms:
                  type: array
                  items:
                    type: string
            displayPreferences:
              type: object
